name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      service_path:
        description: "Path to the service source dir (overrides Dockerfile default of services/<service_name>)"
        required: false
        default: ""
        type: string
      service_name:
        description: "Service to build and push"
        required: true
        type: string
      git_ref:
        description: "Git ref to build"
        required: true
        type: string
      latest:
        description: "Tag the image as latest"
        required: false
        default: false
        type: boolean
      path:
        description: "Parent directory of the Dockerfile"
        required: false
        default: "."
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        default: "Dockerfile"
        type: string
      extra_build_args:
        description: "Extra build args"
        required: false
        default: ""
        type: string
      force_build:
        description: "Skip manifest cache check and always build"
        required: false
        default: false
        type: boolean
      paths:
        description: "Newline-separated list of paths for content hash"
        required: true
        type: string
      destinations:
        description: "Whitespace-separated list of registry paths to publish the image to"
        required: false
        default: "ghcr.io/xataio/xata"
        type: string
    outputs:
      image:
        description: "Docker image name"
        value: ${{ jobs.docker.outputs.image }}
      tag:
        description: "Docker image tag"
        value: ${{ jobs.docker.outputs.tag }}

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image: ${{ steps.build-image.outputs.image }}
      tag: ${{ steps.build-image.outputs.tag }}
    steps:
      - name: Checkout code
        id: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build-image
        env:
          IMAGE: ${{ inputs.service_name }}
          DESTINATIONS: ${{ inputs.destinations }}
          PATHS: ${{ inputs.paths }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          BUILD_PATH: ${{ inputs.path }}
          SERVICE_NAME: ${{ inputs.service_name }}
          SERVICE_PATH: ${{ inputs.service_path }}
          TAG_AS_LATEST: ${{ inputs.latest }}
          EXTRA_BUILD_ARGS: ${{ inputs.extra_build_args }}
          FORCE_BUILD: ${{ inputs.force_build }}
        run: |
          reference=$(make push-image \
            IMAGE="$IMAGE" \
            DESTINATIONS="$DESTINATIONS" \
            PATHS="$PATHS" \
            DOCKERFILE="$DOCKERFILE" \
            BUILD_PATH="$BUILD_PATH" \
            SERVICE_NAME="$SERVICE_NAME" \
            SERVICE_PATH="$SERVICE_PATH" \
            TAG_AS_LATEST="$TAG_AS_LATEST" \
            EXTRA_BUILD_ARGS="$EXTRA_BUILD_ARGS" \
            FORCE_BUILD="$FORCE_BUILD")
          echo "image=${reference%:*}" >> "$GITHUB_OUTPUT"
          echo "tag=${reference#*:}" >> "$GITHUB_OUTPUT"
