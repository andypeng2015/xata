---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: xvols.xata.io
spec:
  group: xata.io
  names:
    kind: Xvol
    listKind: XvolList
    plural: xvols
    shortNames:
    - xv
    singular: xvol
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.volumeState
      name: State
      type: string
    - jsonPath: .status.stateTransitionTime
      name: Since
      type: date
    - jsonPath: .status.capacity
      name: Size
      type: string
    - jsonPath: .status.storageNode
      name: Storage Node
      type: string
    - jsonPath: .status.attach.computeNode
      name: Compute Node
      type: string
    - jsonPath: .status.pvName
      name: PV
      type: string
    - jsonPath: .spec.xvolReclaimPolicy
      name: Reclaim Policy
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Xvol is a volume backed by Xatastor.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: XvolSpec defines the volume's identity and backing storage.
              Fields are immutable after creation unless noted otherwise.
            properties:
              size:
                anyOf:
                - type: integer
                - type: string
                description: |-
                  Requested volume size (e.g. "10Gi", "500Mi"). Required for new volumes,
                  do not set for clones.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              source:
                description: |-
                  Source is the upstream Xvol or snapshot this Xvol was cloned from.
                  Unset for new volumes. Immutable once set.
                properties:
                  snapshot:
                    description: Snapshot is the name of a snapshot to clone from.
                    type: string
                  volume:
                    description: Volume is the name of an existing Xvol to clone from.
                    type: string
                type: object
                x-kubernetes-validations:
                - message: exactly one of spec.source.volume or spec.source.snapshot
                    must be set
                  rule: '(has(self.volume) ? 1 : 0) + (has(self.snapshot) ? 1 : 0)
                    == 1'
              storageNode:
                description: |-
                  Name of the Xatastor storage node that hosts this volume.
                  Optional user preference — if set, the reconciler uses this node;
                  if empty, placement selects a node automatically. Must not be set
                  when spec.source is set: clone placement is pinned to the parent's
                  storage node.
                type: string
              xvolReclaimPolicy:
                default: Delete
                description: |-
                  XvolReclaimPolicy controls XVol lifecycle when its bound PV is deleted.
                  Has no effect while the PV exists or if the PV's reclaimPolicy is Retain.
                  Mutable in Available, Bound, and Connected states; locked in Pending and Deleting.
                enum:
                - Delete
                - Retain
                type: string
            type: object
            x-kubernetes-validations:
            - fieldPath: .storageNode
              message: spec.storageNode is immutable once set
              reason: FieldValueForbidden
              rule: '!has(oldSelf.storageNode) || size(oldSelf.storageNode) == 0 ||
                self.storageNode == oldSelf.storageNode'
            - fieldPath: .size
              message: spec.size is immutable
              reason: FieldValueForbidden
              rule: '!has(self.size) && !has(oldSelf.size) || has(self.size) && has(oldSelf.size)
                && quantity(self.size).compareTo(quantity(oldSelf.size)) == 0'
            - fieldPath: .source
              message: spec.source is immutable once set
              reason: FieldValueForbidden
              rule: '!has(oldSelf.source) || self.source == oldSelf.source'
            - message: spec.size must be set and non-zero for fresh volumes and unset
                for clones
              rule: 'has(self.source) ? !has(self.size) : (has(self.size) && quantity(self.size).isGreaterThan(quantity(''0'')))'
            - message: spec.storageNode must not be set when spec.source is set
              rule: '!has(self.source) || !has(self.storageNode) || size(self.storageNode)
                == 0'
          status:
            description: XvolStatus is the observed state of the volume, managed by
              reconcilers and the CSI node plugin.
            properties:
              attach:
                description: Active NVMe connection state. Present only when state
                  is Connected.
                properties:
                  computeNode:
                    description: Kubernetes node where the volume is attached.
                    type: string
                  nqn:
                    description: |-
                      NQN is the NVMe Qualified Name used for the active connection.
                      Set during Connected, cleared on transition to Bound/Available.
                    type: string
                required:
                - computeNode
                - nqn
                type: object
              capacity:
                anyOf:
                - type: integer
                - type: string
                description: Actual capacity reported by the backend after creation.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              conditions:
                description: Standard conditions representing the volume's health.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              nvmeAddr:
                description: NVMe-oF target IP address for the storage node hosting
                  this volume.
                type: string
              nvmePort:
                description: NVMe-oF target port for the storage node hosting this
                  volume.
                format: int32
                maximum: 65535
                minimum: 1
                type: integer
              observedGeneration:
                description: Last spec generation reconciled by the controller.
                format: int64
                type: integer
              pvName:
                description: |-
                  PVName is the PersistentVolume bound to this XVol during this attach
                  cycle. Set on Bind (Available → Bound), preserved across Connected and
                  force-detach, cleared on transition to Available.
                type: string
              stateTransitionTime:
                description: |-
                  Timestamp of the last state transition (e.g. Available → Bound).
                  Condition-only changes (Connecting, Disconnecting) do not update this.
                format: date-time
                type: string
              storageNode:
                description: |-
                  Actual storage node where the volume was placed. Set by the reconciler
                  after backend creation. Source of truth for all runtime reads.
                type: string
              volumeState:
                description: Lifecycle state of the volume.
                enum:
                - Pending
                - Available
                - Bound
                - Connected
                - Deleting
                type: string
            type: object
            x-kubernetes-validations:
            - message: attach must be set when state is Connected
              rule: '!has(self.volumeState) || self.volumeState != ''Connected'' ||
                has(self.attach)'
            - message: attach must not be set unless state is Connected
              rule: '!has(self.volumeState) || !(self.volumeState == ''Available''
                || self.volumeState == ''Pending'' || self.volumeState == ''Bound'')
                || !has(self.attach)'
            - message: pvName must be set when state is Bound or Connected
              rule: '!has(self.volumeState) || !(self.volumeState == ''Bound'' ||
                self.volumeState == ''Connected'') || has(self.pvName)'
            - message: pvName must not be set when state is Available or Pending
              rule: '!has(self.volumeState) || !(self.volumeState == ''Available''
                || self.volumeState == ''Pending'') || !has(self.pvName)'
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: spec.xvolReclaimPolicy is immutable in Pending and Deleting states
          rule: '!has(oldSelf.status.volumeState) || oldSelf.status.volumeState in
            [''Available'', ''Bound'', ''Connected''] || self.spec.xvolReclaimPolicy
            == oldSelf.spec.xvolReclaimPolicy'
        - message: spec.source.volume must not equal the Xvol's own name
          rule: '!has(self.spec.source) || !has(self.spec.source.volume) || self.spec.source.volume
            != self.metadata.name'
    selectableFields:
    - jsonPath: .status.volumeState
    - jsonPath: .status.storageNode
    - jsonPath: .status.pvName
    - jsonPath: .status.attach.computeNode
    served: true
    storage: true
    subresources:
      status: {}
