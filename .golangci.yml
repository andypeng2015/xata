version: "2"
run:
  go: "1.26"
linters:
  default: none
  enable:
    - copyloopvar
    - errorlint
    - forbidigo
    - forcetypeassert
    - gochecksumtype
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - makezero
    - misspell
    - nakedret
    - nolintlint
    - staticcheck
    - unused
    - modernize
  settings:
    errorlint:
      errorf: true
    forbidigo:
      forbid:
        - pattern: log.With\(\)
        - pattern: fmt.Print*
        - pattern: ^envtest\.Environment$
          msg: "use envtestutil.Setup so the cross-process kube-apiserver binary lock is held"
    goconst:
      numbers: true
    gocritic:
      disabled-checks:
        - exitAfterDefer
        - ifElseChain
        - commentFormatting
    gomodguard:
      blocked:
        modules:
          - github.com/pkg/errors:
              recommendations:
                - errors
                - fmt
              reason: This package is deprecated, use `fmt.Errorf` with `%w` instead
    gosec:
      excludes:
        - G115
        - G601
      severity: low
    makezero:
      always: false
    staticcheck:
      checks:
        - all
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - forbidigo
        path: tools/*
      - linters:
          - forbidigo
        path: internal/envtestutil/
        text: "envtest.Environment"
      - linters:
          - goconst
        path: (.+)_test\.go
      - linters:
          - gosec
        path: (.+)_test\.go
        text: "G101:"
      - linters:
          - gosec
        path: scripts/
        text: "G118:"
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      module-path: xata
      extra-rules: false
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
