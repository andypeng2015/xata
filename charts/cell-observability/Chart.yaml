apiVersion: v2
name: cell-observability
description: Per-cell metrics & logs stack (VictoriaMetrics, VictoriaLogs, vmagent, Vector)
type: application
version: 0.0.0
appVersion: "latest"
dependencies:
  - name: victoria-metrics-single
    alias: victoria-metrics
    version: 0.38.0
    repository: https://victoriametrics.github.io/helm-charts/
  - name: victoria-logs-single
    alias: victoria-logs
    version: 0.12.4
    repository: https://victoriametrics.github.io/helm-charts/
  - name: victoria-metrics-agent
    alias: vmagent
    version: 0.39.0
    repository: https://victoriametrics.github.io/helm-charts/
  - name: vector
    version: 0.52.0
    repository: https://helm.vector.dev
