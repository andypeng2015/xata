# When true, the chart renders a Namespace object matching the release
# namespace. Off by default so production deploys can pre-create the namespace
# with their own labels/annotations; Tilt flips this on.
createNamespace: false

# Namespace where CNPG instance pods live. vmagent scrapes their :9187
# metrics endpoint, so the cnpg-side NetworkPolicy needs to allow it.
clustersNamespace: xata-clusters

networkPolicy:
  # Renders a NetworkPolicy in clustersNamespace allowing vmagent (release
  # namespace, label app.kubernetes.io/name=victoria-metrics-agent) to reach
  # CNPG instance pods on :9187.
  enabled: true

victoria-metrics:
  server:
    fullnameOverride: victoria-metrics
    retentionPeriod: 30d
    podSecurityContext:
      enabled: true
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
    tolerations:
      - key: xata.io/workload
        value: dataplane
        effect: NoSchedule

victoria-logs:
  server:
    fullnameOverride: victoria-logs
    retentionPeriod: 30d
    # Default cap is 256KiB; large CNPG records (huge IN(...) queries, boto3
    # backup dumps) exceed it and VictoriaLogs drops the whole record. Vector
    # truncates upstream (see cnpg_unwrap), so this is just headroom above that.
    extraArgs:
      insert.maxLineSizeBytes: 1MiB
    podSecurityContext:
      enabled: true
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
    tolerations:
      - key: xata.io/workload
        value: dataplane
        effect: NoSchedule

# The metric_relabel keep-lists below are pinned to the entries in
# services/clusters/observability/metrics.go (`metricCatalog`). Update both
# together when adding or removing a metric.
vmagent:
  fullnameOverride: vmagent
  remoteWrite:
    - url: http://victoria-metrics:8428/api/v1/write

  securityContext:
    enabled: true
    runAsNonRoot: true
    runAsUser: 1000

  tolerations:
    - key: xata.io/workload
      value: dataplane
      effect: NoSchedule

  # Chart's default ClusterRole grants nodes + nodes/metrics; cAdvisor scraping
  # via the API server proxy additionally needs nodes/proxy.
  rbac:
    extraRules:
      - apiGroups: [""]
        resources: ["nodes/proxy"]
        verbs: ["get"]
      - nonResourceURLs: ["/metrics/cadvisor"]
        verbs: ["get"]

  config:
    global:
      scrape_interval: 30s
    scrape_configs:
      - job_name: cnpg
        kubernetes_sd_configs: [{role: pod}]
        scheme: https
        tls_config: {insecure_skip_verify: true}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_cnpg_io_podRole]
            regex: instance
            action: keep
          # role:pod SD emits one target per (container, port). The postgres
          # container declares postgresql/metrics/status ports plus there are
          # init containers; without this filter all of them collapse onto
          # the same ${pod_ip}:9187 after the __address__ rewrite below and
          # vmagent logs a duplicate-target error per scrape interval.
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            regex: metrics
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:9187
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_xata_io_branchID]
            target_label: branch_id
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: 'cnpg_pg_database_size_bytes|cnpg_pg_stat_activity_connections_(active|idle)|cnpg_pg_stat_io_total_(reads|writes|read_time_ms|write_time_ms)|cnpg_collector_wal_sync_time|cnpg_pg_replication_lag'
            action: keep

      # role:pod (not role:node) so pod labels are available to the relabel
      # step and branch_id can be attached at scrape time. The pod-equality
      # metric_relabel below drops other pods on the same node returned by the
      # shared kubelet scrape; the cnpg_io_podRole=instance keep filter bounds
      # the fan-out to typically 1-3 scrapes per node.
      - job_name: cadvisor
        kubernetes_sd_configs: [{role: pod}]
        scheme: https
        tls_config: {insecure_skip_verify: true}
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        max_scrape_size: 64MB
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_cnpg_io_podRole]
            regex: instance
            action: keep
          # See cnpg job above: pick one port per pod so the __address__
          # rewrite below doesn't produce identical targets for each port.
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            regex: metrics
            action: keep
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: scrape_target_pod
          - source_labels: [__meta_kubernetes_pod_label_xata_io_branchID]
            target_label: branch_id
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: 'container_(cpu_usage_seconds_total|memory_working_set_bytes|network_(receive|transmit)_bytes_total|fs_(reads|writes)_bytes_total)'
            action: keep
          - source_labels: [namespace]
            regex: xata-clusters
            action: keep
          - source_labels: [pod]
            target_label: scrape_target_pod
            action: keepequal
          - regex: scrape_target_pod
            action: labeldrop
          # `container` is intentionally retained so multi-container pods
          # don't collide at write time.
          - regex: 'id|image|name|boot_id|system_uuid|machine_id|kernelVersion|failure_type'
            action: labeldrop

vector:
  role: Agent
  fullnameOverride: vector

  # Vector tails /var/log/pods which kubelet creates as 0750 root:root, so
  # runAsGroup=0 keeps the group-readable bits accessible while the container
  # itself runs as non-root.
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 0

  tolerations:
    - key: xata.io/workload
      value: dataplane
      effect: NoSchedule

  # Agent has no listening sources, so the chart's empty Service is just noise.
  service: {enabled: false}
  serviceHeadless: {enabled: false}

  # Chart defaults also mount /proc, /sys, /var/lib for host metrics — vmagent
  # scrapes cAdvisor for those, so vector only needs /var/log/pods.
  defaultVolumes:
    - {name: var-log, hostPath: {path: /var/log/}}
  defaultVolumeMounts:
    - {name: var-log, mountPath: /var/log/, readOnly: true}

  # Chart's default /var/lib/vector hostPath is root-owned; emptyDir keeps the
  # checkpoint dir writable regardless of who the container runs as.
  persistence:
    hostPath: {enabled: false}

  # Mirror of observability.unwrapCNPGBody on the query side: pull the Postgres
  # message out of CNPG's JSON wrapping, then rename to VictoriaLogs canonical
  # fields (_msg, _time) so the elasticsearch sink ingests cleanly.
  customConfig:
    data_dir: /vector-data-dir
    sources:
      kubernetes_logs:
        type: kubernetes_logs
        extra_label_selector: cnpg.io/podRole=instance
        auto_partial_merge: true
        pod_annotation_fields:
          pod_name: kubernetes.pod_name
          pod_namespace: kubernetes.namespace_name
          container_name: kubernetes.container_name
    transforms:
      cnpg_unwrap:
        type: remap
        inputs: [kubernetes_logs]
        # Postgres CSV records arrive as
        #   {"level":"info","logger":"postgres","msg":"record","record":{
        #     "error_severity":"INFO","backend_type":"client backend",
        #     "message":"...", ...}}
        # pgaudit records as
        #   {"level":"info","logger":"pgaudit","msg":"record","record":{
        #     "error_severity":"LOG","backend_type":"client backend",
        #     "message":"","audit":{"audit_type":"SESSION",...}}}
        # CNPG instance-manager / barman lines as
        #   {"level":"info","logger":"instance-manager","msg":"..."}
        # The query side (observability/logs.go) filters on logger and reads
        # severity_text + backend_type. For pgaudit we keep the full envelope
        # in _msg so the read side can reconstruct the native CSV; backend_type
        # is forced to "pgaudit" so the process filter targets audit rows
        # without colliding with the underlying "client backend".
        source: |
          logger = "unknown"
          if starts_with(string!(.message), "{") && ends_with(string!(.message), "}") {
            parsed, err = parse_json(.message)
            if err == null {
              if exists(parsed.logger) {
                logger = string!(parsed.logger)
                .logger = logger
              }
              if logger != "pgaudit" && exists(parsed.record.message) {
                .message = string!(parsed.record.message)
              } else if logger != "pgaudit" && exists(parsed.msg) {
                .message = string!(parsed.msg)
              }
              if exists(parsed.record.error_severity) {
                .severity_text = string!(parsed.record.error_severity)
              } else if exists(parsed.level) {
                .severity_text = upcase(string!(parsed.level))
              }
              if logger == "pgaudit" {
                .backend_type = "pgaudit"
              } else if exists(parsed.record.backend_type) {
                .backend_type = string!(parsed.record.backend_type)
              }
            }
          }
          branch_id = get(value: ., path: ["kubernetes", "pod_labels", "xata.io/branchID"]) ?? null
          if branch_id != null {
            .branch_id = branch_id
          }
          ._msg = del(.message)
          ._time = del(.timestamp)
          # VictoriaLogs drops any line over its size cap; truncate so the
          # useful head still ingests and per-record storage stays bounded.
          msg = string(._msg) ?? ""
          if length(msg) > 200000 {
            ._msg = truncate(msg, limit: 200000, suffix: " [truncated]")
          }
      # Empty _msg events make VictoriaLogs log "missing log message after the
      # create/index command"; drop them before the bulk sink.
      drop_empty:
        type: filter
        inputs: [cnpg_unwrap]
        condition:
          type: vrl
          source: "!is_nullish(._msg)"
    sinks:
      vl_logs:
        type: elasticsearch
        inputs: [drop_empty]
        endpoints: [http://victoria-logs:9428/insert/elasticsearch/]
        api_version: v8
        mode: bulk
        compression: gzip
        healthcheck: {enabled: false}
        request:
          headers: {AccountID: "0", ProjectID: "0"}
        # Disk buffer + backpressure to bound vector memory when vlogs is slow.
        buffer:
          type: disk
          max_size: 1073741824
          when_full: block
        # Keep events buffered until VictoriaLogs acks the bulk request.
        acknowledgements:
          enabled: true
