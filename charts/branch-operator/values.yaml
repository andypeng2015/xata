image:
  repository: ghcr.io/xataio/xata/branch-operator
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

config:
  branchOperator:
    imageSecrets: ghcr-secret
    clustersTolerations: "xata.io/workload=dataplane:NoSchedule"

resources:
  limits:
    cpu: 200m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 512Mi

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - branch-operator
          topologyKey: kubernetes.io/hostname

tolerations:
  - key: "xata.io/workload"
    value: "dataplane"
    effect: "NoSchedule"
